<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.header {
    padding:20px;
    font-size:20px;
    text-align:center;
    font-weight:bold;
}

.menu {
    padding:10px;
}

.menu button {
    width:100%;
    padding:15px;
    margin:5px 0;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:16px;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:15px;
}

.actions button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
}

.plus {background:#22c55e;}
.minus {background:#ef4444;}
</style>
</head>

<body>

<div class="header">🖨 Управление</div>

<div class="menu">
    <button onclick="loadPrinters()">📦 Принтеры</button>
    <button onclick="loadHistory()">📜 История</button>
    <button onclick="loadStats()">📊 График</button>
</div>

<div id="content"></div>

<script>
const API = "https://printer-py.vercel.app/"

async function loadPrinters() {
    const res = await fetch(API + "/printers")
    const printers = await res.json()

    let html = "<h3 style='padding:10px'>Принтеры</h3>"

    printers.forEach(p => {
        html += `
        <div class="card">
            <b>${p}</b><br><br>
            <button onclick="openPrinter('${p}')">Открыть</button>
        </div>`
    })

    document.getElementById("content").innerHTML = html
}

async function openPrinter(p) {
    const res = await fetch(API + "/cartridges/" + p)
    const data = await res.json()

    let html = `<h3 style='padding:10px'>${p}</h3>`

    data.forEach(c => {
        html += `
        <div class="card">
            <b>${c.name}</b><br>
            Кол-во: ${c.qty}<br>
            <div class="actions">
                <button class="plus" onclick="update(${c.id}, 'plus')">+</button>
                <button class="minus" onclick="update(${c.id}, 'minus')">-</button>
            </div>
        </div>`
    })

    document.getElementById("content").innerHTML = html
}

async function update(id, action) {
    await fetch(API + "/update", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id, action})
    })
    loadPrinters()
}

async function loadHistory() {
    const res = await fetch(API + "/history")
    const data = await res.json()

    let html = "<h3 style='padding:10px'>История</h3>"

    data.forEach(h => {
        html += `<div class="card">${h[0]} → ${h[1]}<br>${h[2]}</div>`
    })

    document.getElementById("content").innerHTML = html
}

async function loadStats() {
    const res = await fetch(API + "/stats")
    const data = await res.json()

    document.getElementById("content").innerHTML = `<canvas id="chart"></canvas>`

    new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels: data.map(x=>x[0]),
            datasets:[{
                label:"Расход",
                data: data.map(x=>x[1])
            }]
        }
    })
}
</script>

</body>
</html>
