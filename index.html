<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.header {
    text-align:center;
    padding:20px;
    font-size:20px;
}

.menu button {
    width:90%;
    margin:10px auto;
    display:block;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:16px;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="header">🖨 Управление</div>

<div class="menu">
    <button onclick="loadPrinters()">📦 Принтеры</button>
    <button onclick="loadHistory()">📜 История</button>
    <button onclick="loadStats()">📊 График</button>
</div>

<div id="content"></div>

<script>
// ---------------- ДЕМО ДАННЫЕ ----------------

const printers = {
    "HP LaserJet": [
        {name: "CF259A", qty: 5},
        {name: "CF259X", qty: 2}
    ],
    "Kyocera": [
        {name: "TK-1170", qty: 7},
        {name: "TK-3160", qty: 1}
    ]
}

const history = [
    ["TK-1170", "minus", "2026-03-30 14:20"],
    ["CF259A", "minus", "2026-03-30 13:10"],
    ["TK-3160", "minus", "2026-03-29 18:00"],
    ["CF259X", "minus", "2026-03-29 15:30"]
]

// ---------------- ПРИНТЕРЫ ----------------

function loadPrinters(){
    let html = "<h3 style='padding:10px'>Принтеры</h3>"

    Object.keys(printers).forEach(p=>{
        html += `<div class="card">
        ${p}<br>
        <button onclick="openPrinter('${p}')">Открыть</button>
        </div>`
    })

    document.getElementById("content").innerHTML = html
}

// ---------------- ОТКРЫТЬ ПРИНТЕР ----------------

function openPrinter(p){
    let html = `<h3 style='padding:10px'>${p}</h3>`

    printers[p].forEach(c=>{
        html += `<div class="card">
        ${c.name}<br>
        Остаток: ${c.qty}
        </div>`
    })

    document.getElementById("content").innerHTML = html
}

// ---------------- ИСТОРИЯ ----------------

function loadHistory(){
    let html = "<h3 style='padding:10px'>История</h3>"

    history.forEach(h=>{
        html += `<div class="card">
        ${h[0]} → ${h[1]}<br>${h[2]}
        </div>`
    })

    document.getElementById("content").innerHTML = html
}

// ---------------- ГРАФИК ----------------

function loadStats(){

    let stats = {}

    history.forEach(h=>{
        stats[h[0]] = (stats[h[0]] || 0) + 1
    })

    document.getElementById("content").innerHTML = `<canvas id="chart"></canvas>`

    new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:Object.keys(stats),
            datasets:[{
                label:"Расход",
                data:Object.values(stats)
            }]
        }
    })
}
</script>

</body>
</html>
