<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printer App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
}

.btn {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>🖨 Управление</h1>

<div id="menu">
    <button class="btn" onclick="openPrinters()">📦 Принтеры</button>
    <button class="btn" onclick="openHistory()">🧾 История</button>
    <button class="btn" onclick="openStats()">📊 График</button>
</div>

<div id="printers" class="hidden"></div>
<div id="history" class="hidden"></div>
<div id="stats" class="hidden"></div>

</div>

<script>
const API = "https://printer-py.vercel.app/"; // 🔥 СЮДА СВОЙ API

const tg = window.Telegram.WebApp;
tg.expand();

function back() {
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("printers").classList.add("hidden");
    document.getElementById("history").classList.add("hidden");
    document.getElementById("stats").classList.add("hidden");
}

async function openPrinters() {
    document.getElementById("menu").classList.add("hidden");
    const block = document.getElementById("printers");
    block.classList.remove("hidden");

    block.innerHTML = "<h2>📦 Принтеры</h2><button class='btn' onclick='back()'>⬅️ Назад</button>";

    const res = await fetch(API + "/printers");
    const data = await res.json();

    data.forEach(p => {
        block.innerHTML += `
            <div class="card">
                <b>${p.name}</b><br>
                ${p.status}
            </div>
        `;
    });
}

async function openHistory() {
    document.getElementById("menu").classList.add("hidden");
    const block = document.getElementById("history");
    block.classList.remove("hidden");

    block.innerHTML = "<h2>🧾 История</h2><button class='btn' onclick='back()'>⬅️ Назад</button>";

    const res = await fetch(API + "/history");
    const data = await res.json();

    data.forEach(h => {
        block.innerHTML += `
            <div class="card">
                ${h.date}<br>
                ${h.user} → ${h.cartridge} (${h.action})
            </div>
        `;
    });
}

async function openStats() {
    document.getElementById("menu").classList.add("hidden");
    const block = document.getElementById("stats");
    block.classList.remove("hidden");

    block.innerHTML = "<h2>📊 График</h2><button class='btn' onclick='back()'>⬅️ Назад</button>";

    block.innerHTML += `
        <div class="card">
            <img src="${API}/stats" style="width:100%">
        </div>
    `;
}
</script>

</body>
</html>
